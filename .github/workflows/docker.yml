name: Docker build

on:
  schedule:
  - cron: "0 2 * * 0"
  workflow_dispatch:


jobs:
  build-tour-docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    permissions:
      contents: read
      packages: write

    steps:
      - name: Info
        run: |
         echo "Event type: ${{github.event_name}}"

      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
         registry: ghcr.io
         username: ${{ github.actor }}
         password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ergocub-cartesian-control image
        uses: docker/build-push-action@v5
        with:
          context: "docker"
          file: "docker/Dockerfile"
          build-args: |
            base_img="ubuntu:24.04"
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ergocub-cartesian-control:ubuntu24.04_${{ github.event_name == 'schedule' && 'devel' || 'stable' }}
